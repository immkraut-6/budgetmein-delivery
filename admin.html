const TG="8601047628:AAFJ0GppVLF8Fdz-cAlY7C3qAZFZVGGJeHw";
const TG_ORD="-5158992691";
async function tgMsg(text){
  try{await fetch("https://api.telegram.org/bot"+TG+"/sendMessage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:TG_ORD,parse_mode:"HTML",text:text})});}catch(e){}
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ORDERS SECTION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window._allOrders=[];
window.loadOrders=async function(){
  document.getElementById('loading').style.display='block';
  document.getElementById('ordersDiv').innerHTML='';
  try{
    var orders=[];
    var snap=await getDocs(collection(db,"orders"));
    snap.forEach(function(d){orders.push({_docId:d.id,...d.data()});});
    orders.sort(function(a,b){
      var at=a.startTime||0,bt=b.startTime||0;
      if(typeof at==='object'&&at&&at.seconds)at=at.seconds*1000;
      if(typeof bt==='object'&&bt&&bt.seconds)bt=bt.seconds*1000;
      return bt-at;
    });
    window._allOrders=orders;
    renderOrders(orders);
  }catch(e){
    var oErrMsg='❌ Error loading orders: '+e.message;
    if(e.code==='permission-denied'||e.message.indexOf('permission')>-1){
      oErrMsg='⚠️ <b>Permission Error</b> — Cannot read <code>orders</code> collection.<br/>Check Firebase Firestore Rules.';
    }
    document.getElementById('ordersDiv').innerHTML='<div class="errmsg" style="line-height:1.8">'+oErrMsg+'</div>';
  }finally{document.getElementById('loading').style.display='none';}
};

function renderOrders(orders){
  var div=document.getElementById('ordersDiv');
  var active=orders.filter(function(o){return o.status!=='Delivered';}).length;
  var done=orders.filter(function(o){return o.status==='Delivered';}).length;
  var revenue=orders.filter(function(o){return o.status==='Delivered';}).reduce(function(s,o){return s+(o.total||0);},0);
  document.getElementById('stats').innerHTML=
    '<div class="stat"><span class="snum">'+orders.length+'</span><span class="slbl">Total</span></div>'+
    '<div class="stat act"><span class="snum">'+active+'</span><span class="slbl">Active 🔄</span></div>'+
    '<div class="stat dn"><span class="snum">'+done+'</span><span class="slbl">Done ✅</span></div>'+
    '<div class="stat rv"><span class="snum">₹'+revenue+'</span><span class="slbl">Revenue 💰</span></div>';
  if(!orders.length){
    div.innerHTML='<div class="empty">No orders yet 🍔<br/>Orders appear here when customers place them.</div>';
    return;
  }
  div.innerHTML=orders.map(function(o){
    var st=o.startTime||0;
    if(typeof st==='object'&&st&&st.seconds)st=st.seconds*1000;
    var elapsed=st?((Date.now()-st)/60000):0;
    var isDone=o.status==='Delivered';
    var phase='📋 Order Received';
    if(isDone)phase='✅ Delivered';
    else if(elapsed>=18)phase='🛵 Out for Delivery';
    else if(elapsed>=4)phase='🔄 Being Prepared';
    var items=(o.itemsFull&&o.itemsFull.length)
      ?o.itemsFull.map(function(i){return'• '+(i.e||'🍽️')+' '+i.n+(i.meta?' ('+i.meta+')':'')+' ×'+i.qty+'   ₹'+(i.p*i.qty);}).join('\n')
      :(o.items||'—');
    var cleanPhone=(o.phone||'').replace(/\D/g,'');
    if(cleanPhone.length===10) cleanPhone='91'+cleanPhone;
    var maskedPhone=o.phone?o.phone.slice(0,-4).replace(/\d/g,'*')+o.phone.slice(-4):'N/A';

    // ── Delivery boy cash payment status ──
    var cashBox='';
    if(isDone&&o.assignedTo){
      if(o.cashPaid){
        cashBox='<div class="cashpaid">✅ Cash Collected — ₹'+o.total+' paid to owner</div>';
      } else {
        cashBox='<div class="cashpending">⏳ Cash Pending — <b>₹'+o.total+'</b> not paid yet'
          +'<button class="btnpaid" onclick="markCashPaid(\''+o._docId+'\',\''+o.id+'\','+o.total+')">✅ Mark Cash Paid</button></div>';
      }
    }

    return'<div class="ocard '+(isDone?'done':'actv')+'" id="oc-'+o._docId+'">'
      +'<div class="ohead">'
        +'<span class="oid">#'+(o.id||'?')+'</span>'
        +'<span class="ophase '+(isDone?'phdone':'phact')+'">'+phase+'</span>'
        +'<span class="odt">'+(o.date||'')+(o.time?' · '+o.time:'')+'</span>'
      +'</div>'
      +'<div class="ocust">'
        +'<b>👤 '+(o.name||'Guest')+'</b>'
        +'<span>📱 '+maskedPhone+' <small style="color:#555;font-size:.65rem">(hidden for privacy)</small>'
        +' <button onclick="revealPhone(this,\''+o.phone+'\')" style="font-size:.6rem;background:rgba(255,69,0,.15);border:1px solid rgba(255,69,0,.3);color:#FF4500;border-radius:6px;padding:1px 7px;cursor:pointer;margin-left:4px">👁 Emergency</button>'
        +'</span>'
        +'<span>📍 '+(o.address||'N/A')+'</span>'
        +(o.lat&&o.lng
          ?'<a href="https://maps.google.com/maps?q='+o.lat+','+o.lng+'&navigate=yes" target="_blank" class="mapbtn">🗺️ GPS Navigate</a>'
          :(o.address?'<a href="https://maps.google.com/maps?q='+encodeURIComponent(o.address||'Jahangir Puri Delhi')+'&navigate=yes" target="_blank" class="mapbtn mapbtn-text">🗺️ Maps</a>':''))
      +'</div>'
      +(o.specialNote?'<div class="noteBox">📝 <b>Note:</b> '+o.specialNote+'</div>':'')
      // ── DELIVERY BOY INFO ──
      +(o.assignedTo
        ?'<div class="boybox">'
          +'<div class="boybox-title">🛵 Delivery Boy</div>'
          +'<div>👤 <b>'+(o.assignedName||'Unknown')+'</b></div>'
          +'<div>📱 <b>'+(o.assignedPhone||'—')+'</b></div>'
          +(o.acceptedAt?'<div>⏰ Accepted: <b style="color:#FFD700">'+new Date(o.acceptedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+'</b></div>':'')
          +(o.deliveredAt?'<div>✅ Delivered: <b style="color:#28A745">'+new Date(o.deliveredAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+'</b></div>':'')
          +(o.deliveryTimeMin?'<div>⚡ Time: <b style="color:#FF8C00">'+o.deliveryTimeMin+' min</b></div>':'')
        +'</div>'
        :'<div class="waitbox">⏳ Waiting for delivery boy to accept...</div>'
      )
      +cashBox
      +'<pre class="oitems">'+items+'</pre>'
      +'<div class="obill">'
        +'<span>Subtotal: ₹'+(o.subtotal||o.total||0)+'</span>'
        +'<span>Delivery: '+(o.delivery===0?'FREE 🎉':'₹'+(o.delivery||20))+'</span>'
        +'<b class="otot">TOTAL: ₹'+o.total+'</b>'
        +'<span>💵 Cash on Delivery</span>'
      +'</div>'
      +'<div class="oacts">'
        +(!isDone
          ?'<button class="btndeliver" onclick="markDone(\''+o._docId+'\',\''+o.id+'\',this)">📦 Mark Delivered</button>'
          :'<span class="donebadge">✅ Delivered</span>')
        +(cleanPhone?'<a class="btnwa" href="https://wa.me/'+cleanPhone+'?text=Hi+'+encodeURIComponent(o.name||'Customer')+',+your+order+%23'+(o.id||'')+'+is+on+the+way!+%F0%9F%9B%B5+BudgetMein" target="_blank">💬</a>':'')
        +(cleanPhone?'<a class="btnwa" href="tel:+'+cleanPhone+'" style="font-size:.75rem">📞</a>':'')
        +'<button class="btndel" onclick="delOrder(\''+o._docId+'\',\''+o.id+'\')">🗑️</button>'
      +'</div>'
    +'</div>';
  }).join('');
}

// ── Mark Cash Paid ──
window.markCashPaid=async function(docId,orderId,total){
  if(!confirm('Confirm ₹'+total+' cash received from delivery boy for order #'+orderId+'?'))return;
  try{
    await updateDoc(doc(db,'orders',docId),{cashPaid:true,cashPaidAt:Date.now()});
    await tgMsg('💵 <b>CASH RECEIVED!</b>\n──────────────\n🆔 #'+orderId+'\n💰 ₹'+total+' collected from delivery boy\n⏰ '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
    window.loadOrders();
    window.loadDeliveryBoys();
  }catch(e){alert('Error: '+e.message);}
};

window.markDone=async function(docId,orderId,btn){
  if(!confirm('Mark #'+orderId+' as DELIVERED?'))return;
  if(btn){btn.textContent='Updating...';btn.disabled=true;}
  try{
    await updateDoc(doc(db,'orders',docId),{status:'Delivered',deliveredAt:Date.now()});
    var o=window._allOrders.find(function(x){return x._docId===docId;})||{};
    await tgMsg('✅ <b>ORDER DELIVERED!</b>\n──────────────\n🆔 #'+orderId+'\n👤 '+(o.name||'Guest')+'\n💰 ₹'+(o.total||0)+'\n⏰ '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
    window.loadOrders();
  }catch(e){alert('Error: '+e.message);if(btn){btn.textContent='📦 Mark Delivered';btn.disabled=false;}}
};
window.delOrder=async function(docId,orderId){
  if(!confirm('Permanently delete order #'+orderId+'?\nThis cannot be undone!'))return;
  try{
    await deleteDoc(doc(db,'orders',docId));
    window._allOrders=window._allOrders.filter(function(o){return o._docId!==docId;});
    var card=document.getElementById('oc-'+docId);
    if(card){card.style.opacity='0';setTimeout(function(){card.remove();},300);}
    window.loadOrders();
  }catch(e){alert('Error: '+e.message);}
};
window.clearDone=async function(){
  var done=window._allOrders.filter(function(o){return o.status==='Delivered';});
  if(!done.length){alert('No delivered orders to clear!');return;}
  if(!confirm('Delete '+done.length+' delivered orders permanently?'))return;
  try{
    await Promise.all(done.map(function(o){return deleteDoc(doc(db,'orders',o._docId));}));
    alert('✅ Cleared '+done.length+' orders!');
    window.loadOrders();
  }catch(e){alert('Error: '+e.message);}
};
window.revealPhone=function(btn,phone){
  if(!confirm('Show customer phone? Only use for emergencies!'))return;
  btn.parentElement.innerHTML='📱 '+phone+' <small style="color:#FF4500;font-size:.65rem">(revealed)</small>';
};
window.clearAll=async function(){
  if(!window._allOrders.length){alert('No orders to delete!');return;}
  if(!confirm('⚠️ Delete ALL '+window._allOrders.length+' orders permanently?'))return;
  if(!confirm('Last chance! This CANNOT be undone!'))return;
  try{
    await Promise.all(window._allOrders.map(function(o){return deleteDoc(doc(db,'orders',o._docId));}));
    alert('✅ All orders deleted!');
    window.loadOrders();
  }catch(e){alert('Error: '+e.message);}
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DELIVERY BOY MANAGEMENT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window._allBoys=[];

window.loadDeliveryBoys=async function(){
  document.getElementById('boysLoading').style.display='block';
  document.getElementById('boysDiv').innerHTML='';
  try{
    var boys=[];
    var snap=await getDocs(collection(db,'deliveryBoys'));
    snap.forEach(function(d){boys.push({_docId:d.id,...d.data()});});
    boys.sort(function(a,b){return (b.registeredAt||0)-(a.registeredAt||0);});
    window._allBoys=boys;
    renderBoys(boys);
  }catch(e){
    // ✅ FIX: Friendly error messages — "permission-denied" is a Firestore rules issue
    var errMsg='❌ Could not load delivery boys.';
    if(e.code==='permission-denied'||e.message.indexOf('permission')>-1||e.message.indexOf('Permission')>-1){
      errMsg='⚠️ <b>Firestore Permission Error</b><br/>'+
        'Could not read <code>deliveryBoys</code> collection.<br/>'+
        '<b>Fix:</b> In Firebase Console → Firestore → Rules, allow anonymous reads for this collection.<br/>'+
        '<small style="color:#888">Or add: <code>allow read, write: if request.auth != null;</code></small>';
    }
    document.getElementById('boysDiv').innerHTML='<div class="errmsg" style="line-height:1.8">'+errMsg+'</div>';
  }finally{document.getElementById('boysLoading').style.display='none';}
};

function renderBoys(boys){
  var div=document.getElementById('boysDiv');
  var total=boys.length;
  var active=boys.filter(function(b){return !b.blocked;}).length;
  var blocked=boys.filter(function(b){return b.blocked;}).length;
  document.getElementById('boyStats').innerHTML=
    '<div class="stat"><span class="snum">'+total+'</span><span class="slbl">Total Boys</span></div>'+
    '<div class="stat dn"><span class="snum" style="color:#28A745">'+active+'</span><span class="slbl">Active ✅</span></div>'+
    '<div class="stat act"><span class="snum" style="color:#C0392B">'+blocked+'</span><span class="slbl">Blocked 🚫</span></div>';

  if(!boys.length){
    div.innerHTML='<div class="empty">No delivery boys registered yet 🛵<br/>They appear here after registering on delivery.html</div>';
    return;
  }
  div.innerHTML=boys.map(function(b){
    var isBlocked=b.blocked===true;
    var awaitPay=b.pendingPayApproval===true;
    var regDate=b.registeredAt?new Date(b.registeredAt).toLocaleDateString('en-IN'):'Unknown';

    // Pending pay approval box
    var payBox='';
    if(awaitPay&&!isBlocked){
      payBox='<div class="paypending">'
        +'<span>💰 Delivery boy says he has paid ₹'+( b.pendingPayAmount||'?')+' cash</span>'
        +'<div style="display:flex;gap:8px;margin-top:8px">'
        +'<button class="btnyes" onclick="approvePayment(\''+b._docId+'\',\''+b.name+'\',\''+b.pendingPayAmount+'\')">✅ Yes, Received</button>'
        +'<button class="btnno" onclick="rejectPayment(\''+b._docId+'\',\''+b.name+'\')">❌ Not Received</button>'
        +'</div></div>';
    }

    // Awaiting next order permission
    var permBox='';
    if(b.awaitingPermission&&!isBlocked&&!awaitPay){
      permBox='<div class="permpending">'
        +'<span>🔔 <b>'+b.name+'</b> wants permission to take next order</span>'
        +'<div style="display:flex;gap:8px;margin-top:8px">'
        +'<button class="btnyes" onclick="grantPermission(\''+b._docId+'\',\''+b.name+'\')">✅ Allow Next Order</button>'
        +'<button class="btnno" onclick="denyPermission(\''+b._docId+'\',\''+b.name+'\')">❌ Not Yet</button>'
        +'</div></div>';
    }

    return'<div class="boycard '+(isBlocked?'blocked-boy':'')+'" id="boy-'+b._docId+'">'
      +'<div class="boyhead">'
        +'<div class="boyavatar">'+(b.name||'?').charAt(0).toUpperCase()+'</div>'
        +'<div class="boyinfo">'
          +'<div class="boyname">'+(b.name||'Unknown')+(isBlocked?'<span class="blocktag">BLOCKED</span>':'<span class="activetag">ACTIVE</span>')+'</div>'
          +'<div class="boyphone">📱 '+(b.phone||'—')+'</div>'
          +'<div class="boyid" style="font-size:.62rem;color:#444">ID: '+(b.id||b._docId||'—')+' · Joined '+regDate+'</div>'
        +'</div>'
      +'</div>'
      +'<div class="boystats">'
        +'<div class="bstat"><span class="bstatnum">'+(b.totalDeliveries||0)+'</span><span class="bstatlbl">Deliveries</span></div>'
        +'<div class="bstat"><span class="bstatnum">₹'+(b.totalCash||0)+'</span><span class="bstatlbl">Cash Paid</span></div>'
        +'<div class="bstat"><span class="bstatnum">'+(b.pendingOrders||0)+'</span><span class="bstatlbl">In Progress</span></div>'
        +'<div class="bstat"><span class="bstatnum" style="color:'+(b.hasPermission?'#28A745':'#FF4500')+'">'+(b.hasPermission?'YES':'NO')+'</span><span class="bstatlbl">Can Order</span></div>'
      +'</div>'
      +payBox
      +permBox
      +'<div class="boyacts">'
        +(!isBlocked
          ?'<button class="btnblock" onclick="blockBoy(\''+b._docId+'\',\''+b.name+'\')">🚫 Block</button>'
          :'<button class="btnunblock" onclick="unblockBoy(\''+b._docId+'\',\''+b.name+'\')">✅ Unblock</button>')
        +(b.phone?'<a class="btnwa" href="tel:'+(b.phone||'')+'" style="font-size:.8rem;text-decoration:none">📞 Call</a>':'')
        +(b.hasPermission
          ?'<button class="btnrevoke" onclick="revokePermission(\''+b._docId+'\',\''+b.name+'\')">🔒 Revoke Permission</button>'
          :'<button class="btnyes" onclick="grantPermission(\''+b._docId+'\',\''+b.name+'\')">✅ Give Permission</button>')
        +(!isBlocked?'<button class="btndel" onclick="deleteBoy(\''+b._docId+'\',\''+b.name+'\')">🗑️</button>':'')  /* ✅ FIX: can’t delete blocked boys */
      +'</div>'
    +'</div>';
  }).join('');
}

// ── Block / Unblock ──
window.blockBoy=async function(docId,name){
  if(!confirm('Block '+name+'?\nThey will not be able to accept any orders.'))return;
  try{
    await updateDoc(doc(db,'deliveryBoys',docId),{blocked:true,hasPermission:false});
    await tgMsg('🚫 <b>Delivery Boy BLOCKED</b>\n👤 '+name+'\n⏰ '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
    window.loadDeliveryBoys();
  }catch(e){alert('Error: '+e.message);}
};
window.unblockBoy=async function(docId,name){
  if(!confirm('Unblock '+name+'? They can accept orders again.'))return;
  try{
    await updateDoc(doc(db,'deliveryBoys',docId),{blocked:false});
    window.loadDeliveryBoys();
  }catch(e){alert('Error: '+e.message);}
};

// ── Grant / Revoke Permission ──
window.grantPermission=async function(docId,name){
  try{
    await updateDoc(doc(db,'deliveryBoys',docId),{hasPermission:true,awaitingPermission:false,permissionGrantedAt:Date.now()});
    alert('✅ Permission granted to '+name+'\nThey can now accept the next order.');
    window.loadDeliveryBoys();
  }catch(e){alert('Error: '+e.message);}
};
window.denyPermission=async function(docId,name){
  try{
    await updateDoc(doc(db,'deliveryBoys',docId),{awaitingPermission:false});
    alert('❌ Permission denied for '+name+'\nThey must wait.');
    window.loadDeliveryBoys();
  }catch(e){alert('Error: '+e.message);}
};
window.revokePermission=async function(docId,name){
  if(!confirm('Revoke order permission from '+name+'?'))return;
  try{
    await updateDoc(doc(db,'deliveryBoys',docId),{hasPermission:false});
    window.loadDeliveryBoys();
  }catch(e){alert('Error: '+e.message);}
};

// ── Approve / Reject Cash Payment ──
window.approvePayment=async function(docId,name,amount){
  if(!confirm('Confirm you received ₹'+amount+' cash from '+name+'?'))return;
  try{
    var boy=window._allBoys.find(function(b){return b._docId===docId;})||{};
    var newTotal=(boy.totalCash||0)+Number(amount||0);
    await updateDoc(doc(db,'deliveryBoys',docId),{
      pendingPayApproval:false,pendingPayAmount:0,
      hasPermission:true,awaitingPermission:false,
      totalCash:newTotal,
      lastPayAt:Date.now()
    });
    await tgMsg('💵 <b>Cash Payment Confirmed</b>\n👤 '+name+'\n💰 ₹'+amount+' received\n✅ Permission granted for next order\n⏰ '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
    alert('✅ Payment confirmed!\n✅ Permission given to '+name+' for next order.');
    window.loadDeliveryBoys();
    window.loadOrders();
  }catch(e){alert('Error: '+e.message);}
};
window.rejectPayment=async function(docId,name){
  try{
    await updateDoc(doc(db,'deliveryBoys',docId),{pendingPayApproval:false,hasPermission:false});
    alert('❌ Payment rejected for '+name+'.\nThey cannot take orders until payment confirmed.');
    window.loadDeliveryBoys();
  }catch(e){alert('Error: '+e.message);}
};

// ── Delete Boy ──
window.deleteBoy=async function(docId,name){
  if(!confirm('Permanently remove '+name+' from delivery boys?\nThis cannot be undone.'))return;
  try{
    await deleteDoc(doc(db,'deliveryBoys',docId));
    window.loadDeliveryBoys();
  }catch(e){alert('Error: '+e.message);}
};

</script>
<style>

.ocust{font-size:.78rem;color:#aaa;padding:9px;background:rgba(255,255,255,.03);border-radius:9px;margin-bottom:9px;display:flex;flex-direction:column;gap:4px}
.ocust b{color:#fff;font-size:.82rem}
.mapbtn{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;border-radius:8px;padding:4px 10px;font-size:.7rem;font-weight:700;text-decoration:none;margin-top:4px;width:fit-content}
.mapbtn-text{background:rgba(26,115,232,.2);border:1px solid rgba(26,115,232,.4)}
.noteBox{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);border-radius:8px;padding:8px 10px;font-size:.74rem;color:#FFD700;margin-bottom:9px}
.boybox{background:rgba(40,167,69,.08);border:1.5px solid rgba(40,167,69,.3);border-radius:10px;padding:10px 12px;margin-bottom:9px;font-size:.76rem;line-height:1.9;color:#ccc}

.waitbox{background:rgba(255,69,0,.06);border:1px dashed rgba(255,69,0,.2);border-radius:10px;padding:8px 12px;margin-bottom:9px;font-size:.74rem;color:#FF4500}
.cashpaid{background:rgba(40,167,69,.1);border:1px solid rgba(40,167,69,.3);border-radius:10px;padding:8px 12px;margin-bottom:9px;font-size:.74rem;color:#28A745;font-weight:600}
.cashpending{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);border-radius:10px;padding:10px 12px;margin-bottom:9px;font-size:.76rem;color:#FFD700;display:flex;flex-direction:column;gap:4px}
pre.oitems{font-family:'Poppins',sans-serif;font-size:.74rem;color:#777;padding:9px;background:rgba(255,255,255,.02);border-radius:9px;margin-bottom:9px;white-space:pre-wrap;line-height:1.9}
.obill{display:flex;flex-wrap:wrap;gap:8px;font-size:.74rem;color:#555;margin-bottom:12px}
.otot{color:#FFD700!important;font-size:.82rem}
.oacts{display:flex;gap:8px;flex-wrap:wrap}
.btndeliver{flex:1;min-width:120px;padding:10px;border:none;border-radius:50px;background:linear-gradient(135deg,#28A745,#1E7E34);color:#fff;font-family:'Poppins',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .25s}
.btndeliver:hover:not(:disabled){transform:scale(1.02)}
.btndeliver:disabled{background:#2A2A3E;cursor:not-allowed}
.btndel{padding:10px 14px;border:1.5px solid #C0392B33;border-radius:50px;background:transparent;color:#C0392B;cursor:pointer;transition:all .2s}
.btndel:hover{background:rgba(192,57,43,.12)}
.btnwa{padding:8px 12px;border:1.5px solid rgba(37,211,102,.3);border-radius:50px;background:transparent;color:#25D366;cursor:pointer;transition:all .2s;text-decoration:none;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.btnwa:hover{background:rgba(37,211,102,.12)}
.btnpaid{margin-left:8px;padding:4px 12px;border:none;border-radius:20px;background:#28A745;color:#fff;font-family:'Poppins',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer}
.donebadge{flex:1;text-align:center;padding:9px;color:#28A745;font-size:.82rem;font-weight:600;background:rgba(40,167,69,.07);border-radius:50px}
/* ── DELIVERY BOY CARDS ── */
.boycard{background:#1A1A2E;border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid #1E1E30;transition:all .3s}
.boycard.blocked-boy{border-color:rgba(192,57,43,.4);opacity:.7}
.boyhead{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.boyavatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#FF4500,#CC3700);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;color:#fff;flex-shrink:0}
.boyinfo{flex:1}
.boyname{font-size:.9rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.blocktag{font-size:.6rem;background:rgba(192,57,43,.2);border:1px solid rgba(192,57,43,.4);color:#C0392B;padding:2px 7px;border-radius:20px;font-weight:600}
.activetag{font-size:.6rem;background:rgba(40,167,69,.15);border:1px solid rgba(40,167,69,.3);color:#28A745;padding:2px 7px;border-radius:20px;font-weight:600}
.boyphone{font-size:.76rem;color:#777;margin-top:2px}
.boyid{font-size:.62rem;color:#444;margin-top:2px}
.boystats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.bstat{background:rgba(255,255,255,.03);border-radius:9px;padding:8px;text-align:center}
.bstatnum{display:block;font-size:1rem;font-weight:800;color:#FF4500}
.bstatlbl{font-size:.6rem;color:#555}
.paypending{background:rgba(255,215,0,.08);border:1.5px solid rgba(255,215,0,.3);border-radius:10px;padding:12px;margin-bottom:10px;font-size:.8rem;color:#FFD700}
.permpending{background:rgba(255,69,0,.08);border:1.5px solid rgba(255,69,0,.3);border-radius:10px;padding:12px;margin-bottom:10px;font-size:.8rem;color:#FF8C00}
.boyacts{display:flex;gap:8px;flex-wrap:wrap}
.btnblock{padding:8px 14px;border:1.5px solid rgba(192,57,43,.4);border-radius:50px;background:rgba(192,57,43,.1);color:#C0392B;cursor:pointer;font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:600;transition:all .2s}
.btnblock:hover{background:rgba(192,57,43,.2)}
.btnunblock{padding:8px 14px;border:1.5px solid rgba(40,167,69,.4);border-radius:50px;background:rgba(40,167,69,.1);color:#28A745;cursor:pointer;font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:600}
.btnrevoke{padding:8px 14px;border:1.5px solid rgba(255,140,0,.3);border-radius:50px;background:rgba(255,140,0,.08);color:#FF8C00;cursor:pointer;font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:600}
.btnyes{padding:8px 14px;border:none;border-radius:50px;background:linear-gradient(135deg,#28A745,#1E7E34);color:#fff;cursor:pointer;font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:700}
.btnno{padding:8px 14px;border:none;border-radius:50px;background:rgba(192,57,43,.2);color:#C0392B;cursor:pointer;font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:600;border:1px solid rgba(192,57,43,.3)}

  #stats,#boyStats{grid-template-columns:1fr 1fr}
  .boystats{grid-template-columns:1fr 1fr}
  .ohead{flex-direction:column;align-items:flex-start}
  .odt{margin-left:0}
  .tabs .tab{font-size:.72rem;padding:8px 4px}

</style>
</head>
<body>
<div id="loginWrap">
  <div class="lbox">
    <h2>🍕 BudgetMein</h2>
    <p>Admin Panel — Enter PIN</p>
    <div class="pins">
      <input type="password" maxlength="1" id="p1" inputmode="numeric" oninput="mf(this,'p2')"/>
      <input type="password" maxlength="1" id="p2" inputmode="numeric" oninput="mf(this,'p3')"/>
      <input type="password" maxlength="1" id="p3" inputmode="numeric" oninput="mf(this,'p4')"/>
      <input type="password" maxlength="1" id="p4" inputmode="numeric" oninput="chkPin()"/>
    </div>
    <div id="pinErr"></div>
    <button class="lbtn" onclick="chkPin()">Enter Admin Panel 🚀</button>
    <button class="cpbtn" onclick="toggleCP()">🔐 Change PIN</button>
    <div id="cpbox">
      <label>Current PIN</label>
      <input type="password" id="curP" maxlength="4" inputmode="numeric" placeholder="Current PIN"/>
      <label>New PIN (4 digits)</label>
      <input type="password" id="newP" maxlength="4" inputmode="numeric" placeholder="New PIN"/>
      <label>Confirm New PIN</label>
      <input type="password" id="cnfP" maxlength="4" inputmode="numeric" placeholder="Confirm PIN"/>
      <button class="spbtn" onclick="savePIN()">✅ Save New PIN</button>
    </div>
  </div>
</div>
<div id="panel">
  <div class="topbar">
    <h1>🍕 BudgetMein Admin</h1>
    <span id="livetime"></span>
    <button class="rbtn" onclick="refreshAll()">🔄 Refresh</button>
    <button class="rbtn red" onclick="clearDone()">🗑️ Clear Done</button>
    <button class="rbtn red" onclick="clearAll()">⚠️ Clear All</button>
    <button class="rbtn grey" onclick="exitAdmin()">Exit</button>
  </div>
  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" id="tab-orders" onclick="showTab('orders')">📋 Orders</button>
    <button class="tab" id="tab-boys" onclick="showTab('boys')">🛵 Delivery Boys</button>
  </div>
  <!-- ORDERS TAB -->
  <div id="tabOrders">
    <div id="stats"></div>
    <div id="loading">Loading orders...</div>
    <div id="ordersDiv"></div>
  </div>
  <!-- DELIVERY BOYS TAB -->
  <div id="tabBoys" style="display:none">
    <div id="boyStats"></div>
    <div id="boysLoading">Loading delivery boys...</div>
    <div id="boysDiv"></div>
  </div>
</div>
<script>
function getPin(){return localStorage.getItem('bm_admin_pin')||'1234';}
function mf(el,nid){if(el.value.length===1){var n=document.getElementById(nid);if(n)n.focus();}}
function chkPin(){
  var pin=['p1','p2','p3','p4'].map(function(id){return document.getElementById(id).value;}).join('');
  if(pin.length<4)return;
  if(pin===getPin()){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('panel').style.display='block';
    loadOrders();
    loadDeliveryBoys();
    setInterval(refreshAll,20000);
    setInterval(function(){document.getElementById('livetime').textContent=new Date().toLocaleTimeString('en-IN');},1000);
  } else {
    document.getElementById('pinErr').textContent='❌ Wrong PIN!';
    ['p1','p2','p3','p4'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('p1').focus();
    setTimeout(function(){document.getElementById('pinErr').textContent='';},2000);
  }
}
function toggleCP(){var b=document.getElementById('cpbox');b.style.display=b.style.display==='block'?'none':'block';}
function savePIN(){
  var c=document.getElementById('curP').value;
  var n=document.getElementById('newP').value;
  var f=document.getElementById('cnfP').value;
  if(c!==getPin()){alert('❌ Current PIN is wrong!');return;}
  if(!/^\d{4}$/.test(n)){alert('New PIN must be exactly 4 digits!');return;}
  if(n!==f){alert('PINs do not match!');return;}
  localStorage.setItem('bm_admin_pin',n);
  alert('✅ PIN changed!\nPlease remember: '+n);
  document.getElementById('cpbox').style.display='none';
  ['curP','newP','cnfP'].forEach(function(id){document.getElementById(id).value='';});
}
function exitAdmin(){
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('panel').style.display='none';
  ['p1','p2','p3','p4'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('p1').focus();
}
function showTab(tab){
  document.getElementById('tabOrders').style.display=tab==='orders'?'block':'none';
  document.getElementById('tabBoys').style.display=tab==='boys'?'block':'none';
  document.getElementById('tab-orders').classList.toggle('active',tab==='orders');
  document.getElementById('tab-boys').classList.toggle('active',tab==='boys');
}
function refreshAll(){
  loadOrders();
  loadDeliveryBoys();
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('loginWrap').style.display!=='none')chkPin();
});
</script>
</body>
</html>
